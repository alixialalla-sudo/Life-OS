workflows:
  android-build:
    name: LifeOS Android APK

    max_build_duration: 60

    environment:
      node: 18
      java: 17

    triggering:
      events:
        - push

    scripts:
      - name: Install Capacitor
        script: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create Capacitor Config
        script: |
          cat > capacitor.config.json << EOF
          {
            "appId": "com.lifeos.app",
            "appName": "LifeOS",
            "webDir": "www"
          }
          EOF

      - name: Add Android Platform
        script: |
          npx cap add android

      - name: Sync Android
        script: |
          npx cap sync android

      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - alixialalla@gmail.com