<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#2563eb">
<title>LifeOS V10 PWA</title>
<style>
body{font-family:system-ui,sans-serif;margin:0;background:#f3f4f6}
header{background:#2563eb;color:white;padding:12px;text-align:center}
.page{display:none;padding:12px 12px 80px}.active{display:block}
.card{background:white;border-radius:12px;padding:12px;margin-bottom:12px}
nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:white;border-top:1px solid #ccc}
nav button{flex:1;padding:12px;border:none;background:white}
input,select,textarea,button{width:100%;padding:10px;margin:4px 0;box-sizing:border-box}
button.action{background:#2563eb;color:white;border:none;border-radius:8px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day{background:#e5e7eb;padding:8px;text-align:center;border-radius:6px}
</style>
</head>
<body>
<header><h2>LifeOS V10</h2><div>Add to Home Screen from your browser menu</div></header>

<div id="home" class="page active">
<div class="card">
<h3>Dashboard</h3>
<div id="stats"></div>
</div>
<div class="card">
<h3>Add Deadline</h3>
<input id="ddate" type="date">
<input id="dname" placeholder="Deadline">
<button class="action" onclick="addDeadline()">Save</button>
<table id="deadlines" width="100%"></table>
</div>
<div class="card">
<h3>Calendar</h3>
<div class="calendar" id="cal"></div>
</div>
</div>

<div id="tasks" class="page">
<div class="card">
<select id="cat"><option>Study</option><option>Work</option><option>Cleaning</option><option>Exercise</option></select>
<input id="task" placeholder="Task">
<button class="action" onclick="addTask()">Add Task</button>
<ul id="tasklist"></ul>
</div>
</div>

<div id="health" class="page">
<div class="card">
<h3>Medication</h3>
<input id="med" placeholder="Medication">
<input id="dose" placeholder="Dose">
<button class="action" onclick="addMed()">Log</button>
<ul id="medlist"></ul>
</div>
<div class="card">
<h3>Weight & Exercise</h3>
<input id="weight" placeholder="Weight">
<input id="steps" placeholder="Steps">
<input id="exercise" placeholder="Exercise Minutes">
<button class="action" onclick="saveHealth()">Save</button>
</div>
</div>

<div id="adhd" class="page">
<div class="card">
<input id="focus" placeholder="Focus 1-5">
<input id="mood" placeholder="Mood 1-5">
<textarea id="notes" placeholder="Psychiatrist notes"></textarea>
<button class="action" onclick="saveADHD()">Save</button>
</div>
<div class="card">
<button class="action" onclick="exportData()">Export Backup (JSON)</button>
<pre id="export"></pre>
</div>
</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('tasks')">Tasks</button>
<button onclick="show('health')">Health</button>
<button onclick="show('adhd')">ADHD</button>
</nav>

<script>
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function get(k,d=[]){return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));}
function set(k,v){localStorage.setItem(k,JSON.stringify(v));}

function addDeadline(){
 let a=get('deadlines'); a.push({date:ddate.value,name:dname.value}); set('deadlines',a); render();
}
function addTask(){
 let a=get('tasks'); a.push({cat:cat.value,name:task.value}); set('tasks',a); render();
}
function addMed(){
 let a=get('meds'); a.push({med:med.value,dose:dose.value,date:new Date().toLocaleString()}); set('meds',a); render();
}
function saveHealth(){ set('health',{weight:weight.value,steps:steps.value,exercise:exercise.value}); alert('Saved');}
function saveADHD(){ set('adhd',{focus:focus.value,mood:mood.value,notes:notes.value}); alert('Saved');}

function render(){
 let d=get('deadlines');
 deadlines.innerHTML='<tr><th>Date</th><th>Name</th><th>Days Left</th></tr>';
 d.forEach(x=>{
   let days=Math.ceil((new Date(x.date)-new Date())/86400000);
   deadlines.innerHTML += `<tr><td>${x.date}</td><td>${x.name}</td><td>${days}</td></tr>`;
 });
 tasklist.innerHTML=get('tasks').map(t=>`<li><input type="checkbox"> [${t.cat}] ${t.name}</li>`).join('');
 medlist.innerHTML=get('meds').map(m=>`<li>${m.date} - ${m.med} ${m.dose}</li>`).join('');
 stats.innerHTML=`Deadlines: ${d.length}<br>Tasks: ${get('tasks').length}<br>Medication Logs: ${get('meds').length}`;
}
function exportData(){
 document.getElementById('export').textContent = JSON.stringify(localStorage,null,2);
}
function buildCal(){
 for(let i=1;i<=31;i++){cal.innerHTML+=`<div class="day">${i}</div>`;}
}
buildCal(); render();
</script>
</body>
</html>
